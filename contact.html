<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Catherine's Mini Arcade</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="game1.html">Game 1</a>
        <a href="game2.html">Game 2</a>
        <a href="game3.html">Game 3</a>
        <a href="game4.html">Game 4</a>
        <a href="contact.html">Contact</a>
        <button id="theme-toggle" class="theme-btn">Light Mode</button>
    </nav>
</header>

<main>
    <section class="game-section">
        <h2>📬 Contact / Feedback</h2>
        <p>Send me a message!</p>

        <form id="contact-form" class="contact-form">
            <label>Name</label>
            <input type="text" id="contact-name" placeholder="Your name">

            <label>Email</label>
            <input type="email" id="contact-email" placeholder="Your email">

            <label>Message</label>
            <textarea id="contact-message" placeholder="Your message"></textarea>

            <button type="submit" class="theme-btn">Send</button>
        </form>

        <p id="contact-feedback"></p>
    </section>
</main>

<footer>
    <p>© 2026 Catherine's Mini Arcade</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
