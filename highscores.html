<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Scores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Catherine's Mini Arcade</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="game1.html">Game 1</a>
        <a href="game2.html">Game 2</a>
        <a href="game3.html">Game 3</a>
        <a href="game4.html">Game 4</a>
        <a href="highscores.html">High Scores</a>
        <button id="theme-toggle" class="theme-btn">Light Mode</button>
    </nav>
</header>

<main>
    <section class="game-section">
        <h2>🏆 High Scores</h2>
        <p>Add your name and a comment!</p>

<form id="score-form" class="contact-form">

    <label>Your Name</label>
    <input type="text" id="score-name" placeholder="Enter your name">

    <label>Your Comment</label>
    <input type="text" id="score-comment" placeholder="Enter a comment">

    <label>Game</label>
    <select id="score-game">
        <option value="Guess the Number">Guess the Number</option>
        <option value="Click Speed Challenge">Click Speed Challenge</option>
        <option value="Memory Flip">Memory Flip</option>
        <option value="Rock, Paper, Scissors">Rock, Paper, Scissors</option>
    </select>

    <button type="submit" class="theme-btn">Submit Score</button>
</form>

<h3 class="mt-4">Leaderboard</h3>

<label class="mt-3">
    <input type="checkbox" id="top-five-toggle">
    Show only Top 5
</label>

<ul id="score-list" class="score-list"></ul>
    </section>
</main>

<footer>
    <p>© 2026 Catherine's Mini Arcade</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
