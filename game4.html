<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Catherine's Mini Arcade</h1>
   <nav>
  <a href="index.html">Home</a>
        <a href="game1.html">Game 1</a>
        <a href="game2.html">Game 2</a>
        <a href="game3.html">Game 3</a>
        <a href="game4.html">Game 4</a>
        <a href="highscores.html">High Scores</a>
    <button id="theme-toggle" class="theme-btn">Light Mode</button>
</nav>
</header>

<main>
    <section id="game4" class="game-section">
        <h2>✊ Rock ✋ Paper ✌️ Scissors</h2>
        <p>Choose your move and try to beat the computer!</p>

        <div class="rps-buttons">
            <button class="rps-btn" data-move="rock">✊ Rock</button>
            <button class="rps-btn" data-move="paper">✋ Paper</button>
            <button class="rps-btn" data-move="scissors">✌️ Scissors</button>
        </div>

        <p id="rps-result" class="mt-4"></p>
    </section>
</main>

<div id="highscore-popup" class="highscore-popup">
    <h3>🎉 New High Score!</h3>
    <p>You beat the previous record!</p>

    <label>Your Name</label>
    <input type="text" id="hs-name" placeholder="Enter your name">

    <label>Comment</label>
    <input type="text" id="hs-comment" placeholder="Add a comment">

    <button id="hs-save" class="theme-btn">Save Score</button>
</div>

<footer>
    <p>© 2026 Catherine's Mini Arcade</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
